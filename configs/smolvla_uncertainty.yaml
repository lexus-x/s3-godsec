# SmolVLA + Uncertainty-Aware Flow Matching
# Multi-sample prediction with conformal calibration
# Best for: safety-critical applications, knowing when wrong

model:
  name: "SmolVLA_SE3"
  backbone: "smolvla"
  backbone_path: "lerobot/smolvla_base"
  hidden_dim: 768
  freeze_backbone: true

  # Uncertainty-aware head
  head_type: "uncertainty"
  head_hidden_dim: 256
  n_layers: 4
  time_embed_dim: 64
  source_scale: 0.1
  n_uncertainty_samples: 10    # N: samples for uncertainty estimation
  conformal_alpha: 0.1         # miscoverage level (90% coverage)

training:
  n_flow_steps_train: 10
  n_flow_steps_eval: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 50
  gradient_clip_norm: 1.0

data:
  benchmark: "synthetic"
  n_train_per_family: 2500
  n_val_per_family: 250
  image_size: [224, 224]

logging:
  save_interval: 10
  checkpoint_dir: "checkpoints/smolvla_se3/"
