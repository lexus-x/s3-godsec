# SmolVLA + Geodesic Action Chunking
# Predicts K anchor poses, interpolates H actions along geodesics
# Best for: smooth trajectory prediction, reducing jerk

model:
  name: "SmolVLA_SE3"
  backbone: "smolvla"
  backbone_path: "lerobot/smolvla_base"
  hidden_dim: 768
  freeze_backbone: true

  # Geodesic chunking head
  head_type: "chunk"
  head_hidden_dim: 256
  n_layers: 3
  chunk_size: 8         # H: number of output actions
  n_anchors: 2          # K: number of geodesic anchors (must divide H-1)

training:
  n_flow_steps_train: 10
  n_flow_steps_eval: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 50
  gradient_clip_norm: 1.0

data:
  benchmark: "synthetic"
  n_train_per_family: 2500
  n_val_per_family: 250
  image_size: [224, 224]

logging:
  save_interval: 10
  checkpoint_dir: "checkpoints/smolvla_se3/"
