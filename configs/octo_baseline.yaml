# Euclidean Baseline Configuration
# For comparison with SE(3) head

model:
  name: "OctoEuclideanBaseline"
  octo_checkpoint: "checkpoints/octo-base"
  hidden_dim: 768
  freeze_backbone: true

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 100
  lr_scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip_norm: 1.0

data:
  benchmark: "metaworld"
  task_suite: "mt50"
  n_demos_per_task: 50
  chunk_size: 8
  image_size: [224, 224]
  augmentation: true

evaluation:
  n_episodes_per_task: 100
  n_seeds: 3
