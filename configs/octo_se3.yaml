# SE(3) Action Head Configuration
# For MetaWorld MT-50 experiments

model:
  name: "OctoSE3"
  octo_checkpoint: "checkpoints/octo-base"
  hidden_dim: 768
  head_hidden_dim: 256
  n_layers: 4
  time_embed_dim: 64
  source_scale: 0.1
  freeze_backbone: true

training:
  n_flow_steps_train: 10
  n_flow_steps_eval: 10
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 100
  lr_scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip_norm: 1.0
  rotation_weight: 1.0
  translation_weight: 1.0

data:
  benchmark: "metaworld"
  task_suite: "mt50"
  n_demos_per_task: 50
  chunk_size: 8
  image_size: [224, 224]
  augmentation: true

evaluation:
  n_episodes_per_task: 100
  n_seeds: 3
  tasks_subset: "all"  # "all", "rotation_heavy", "translation_heavy"

logging:
  wandb_project: "se3-vla"
  log_interval: 10
  save_interval: 10
  checkpoint_dir: "checkpoints/"
