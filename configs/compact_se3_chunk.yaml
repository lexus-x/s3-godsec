# SE(3)-VLA Compact — Geodesic Chunking
# Under 400M parameters, temporally coherent action chunks
# Best for: smooth trajectory prediction

model:
  name: "CompactSE3VLA"
  vision_model: "siglip-base"
  freeze_vision: true
  language_model: "smolLM-135M"
  freeze_language: false
  hidden_dim: 768

  head_type: "chunk"
  head_hidden_dim: 256
  n_layers: 3
  chunk_size: 8
  n_anchors: 2

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 50
  gradient_clip_norm: 1.0

data:
  benchmark: "synthetic"
  n_train_per_family: 2500
  n_val_per_family: 250
  image_size: [224, 224]

logging:
  save_interval: 10
  checkpoint_dir: "checkpoints/compact_se3/"
