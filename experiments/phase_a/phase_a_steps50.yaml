# SE(3) Action Head + Scene-ID Backbone
# Clean experiment: tests head geometry in isolation

model:
  name: "OctoSE3"
  hidden_dim: 768
  head_hidden_dim: 256
  n_layers: 4
  time_embed_dim: 64
  source_scale: 0.1
  freeze_backbone: false
  backbone_kind: "scene_id"
  n_tasks: 2

training:
  n_flow_steps_train: 50
  n_flow_steps_eval: 50
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  batch_size: 32
  n_epochs: 50
  gradient_clip_norm: 1.0

data:
  n_train_per_family: 2500
  n_val_per_family: 250
  image_size: [224, 224]

logging:
  save_interval: 25
  checkpoint_dir: "checkpoints/"
